<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ожидание</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        .waiting { color: orange; }
        .btn { display: inline-block; padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h1 class="waiting">Ожидание...</h1>
    <p>Нет задач, требующих вмешательства пользователя.</p>
    <p>Workflow может быть завершен или ожидать внешнего события.</p>
    <a href="/workflow/{{ workflow_id }}" class="btn">Обновить</a>
    <a href="/" class="btn">На главную</a>
</body>
</html>
